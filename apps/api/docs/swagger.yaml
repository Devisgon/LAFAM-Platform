    StaffPortalRole:
      type: string
      enum:
        - trainer
        - staff
      example: trainer

    StaffProfileStatus:
      type: string
      enum:
        - available
        - unavailable
        - on_leave
        - deactivated
        - deleted
      example: available

    StaffAssignableProfileStatus:
      type: string
      enum:
        - available
        - unavailable
        - on_leave
      example: available

    StaffDayOfWeek:
      type: integer
      enum:
        - 0
        - 1
        - 2
        - 3
        - 4
        - 5
        - 6
      description: Day of week where 0 is Sunday and 6 is Saturday.
      example: 1

    StaffAvailabilityRuleInput:
      type: object
      required:
        - day_of_week
        - start_time
        - end_time
      properties:
        day_of_week:
          $ref: '#/components/schemas/StaffDayOfWeek'
        start_time:
          type: string
          pattern: '^(?:[01]\d|2[0-3]):[0-5]\d$'
          example: '09:00'
        end_time:
          type: string
          pattern: '^(?:[01]\d|2[0-3]):[0-5]\d$'
          example: '17:00'
        is_available:
          type: boolean
          default: true
          example: true

    StaffAvailabilityRule:
      type: object
      required:
        - id
        - day_of_week
        - start_time
        - end_time
        - is_available
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        day_of_week:
          $ref: '#/components/schemas/StaffDayOfWeek'
        start_time:
          type: string
          example: '09:00'
        end_time:
          type: string
          example: '17:00'
        is_available:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    StaffProfile:
      type: object
      required:
        - id
        - app_user_id
        - auth_user_id
        - email
        - phone
        - display_name
        - portal_role
        - post_title
        - address
        - bio
        - specialties
        - staff_status
        - auth_status
        - email_verification_required
        - availability
        - created_at
        - updated_at
        - deactivated_at
        - deleted_at
      properties:
        id:
          type: string
          format: uuid
        app_user_id:
          type: string
          format: uuid
        auth_user_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
          example: trainer@example.com
        phone:
          type: string
          nullable: true
          example: '+96550000000'
        display_name:
          type: string
          example: Sarah Pilates Trainer
        portal_role:
          $ref: '#/components/schemas/StaffPortalRole'
        post_title:
          type: string
          example: Pilates Trainer
        address:
          type: string
          nullable: true
          example: Salmiya, Kuwait
        bio:
          type: string
          nullable: true
          example: Certified Pilates trainer with reformer experience.
        specialties:
          type: array
          items:
            type: string
          example:
            - Reformer Pilates
            - Mat Pilates
        staff_status:
          $ref: '#/components/schemas/StaffProfileStatus'
        auth_status:
          $ref: '#/components/schemas/AuthUserStatus'
        email_verification_required:
          type: boolean
          example: true
        availability:
          type: array
          items:
            $ref: '#/components/schemas/StaffAvailabilityRule'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deactivated_at:
          type: string
          format: date-time
          nullable: true
        deleted_at:
          type: string
          format: date-time
          nullable: true


          example: '09:00'
          description: Time-slot start time in 24-hour HH:mm format.
        duration_minutes:
          type: integer
          minimum: 15
          maximum: 240
          example: 60
          description: Time-slot duration in minutes. Backend calculates end_time from start_time and duration_minutes.
        capacity:
          type: integer
          minimum: 1
          maximum: 100
          example: 8
          description: Optional slot-level capacity override. If omitted, the schedule/class capacity fallback is used.
        studio:
          type: string
          minLength: 1
          maxLength: 120
          nullable: true
          example: LAFAM Pilates Studio
          description: Optional slot-level studio override. If omitted, the schedule studio is used.
        price_amount:
          type: number
          minimum: 0
          nullable: true
          example: 15
          description: Optional slot-level price override. If omitted, the schedule/class price fallback is used.
        currency:
          allOf:
            - $ref: '#/components/schemas/PaymentCurrency'
          nullable: true
          description: Optional slot-level currency. KWD is currently supported.
    CreatePilatesScheduleRequest:
      oneOf:
        - $ref: '#/components/schemas/CreateSinglePilatesScheduleRequest'
        - $ref: '#/components/schemas/CreateRecurringPilatesScheduleRequest'

    CreateSinglePilatesScheduleRequest:
      type: object
      required:
        - class_id
        - trainer_staff_profile_id
        - class_date
      anyOf:
        - required:
            - start_time
        - required:
            - time_slots
      properties:
        mode:
          type: string
          enum:
            - single
          default: single
          description: Optional. Missing mode is treated as single for backward compatibility.
          example: single
        class_id:
          type: string
          format: uuid
        trainer_staff_profile_id:
          type: string
          format: uuid
        studio:
          type: string
          minLength: 1
          maxLength: 120
          default: LAFAM Pilates Studio
          example: LAFAM Pilates Studio
        class_date:
          type: string
          pattern: '^\d{4}-\d{2}-\d{2}$'
          example: '2026-06-22'
        start_time:
          type: string
          pattern: '^(?:[01]\d|2[0-3]):[0-5]\d$'
          example: '10:00'
          description: Backward-compatible single-time field. Required when time_slots is omitted.
        duration_minutes:
          type: integer
          minimum: 15
          maximum: 240
          default: 60
          example: 60
          description: Schedule-level duration used by backward-compatible single-time creation. Slot-level duration_minutes is used when time_slots is provided.
        capacity:
          type: integer
          minimum: 1
          maximum: 100
          example: 8
          description: Schedule-level capacity fallback. Slot-level capacity overrides this value when time_slots is provided.
        time_slots:
          type: array
          minItems: 1
          maxItems: 12
          description: Multiple schedule slots to create on the same class_date. Required when start_time is omitted.
          items:
            $ref: '#/components/schemas/PilatesScheduleTimeSlotInput'
        price_amount:
          type: number
          minimum: 0
          nullable: true
          example: 15
          description: Optional schedule-level price override. If null or omitted, class default price is used. Slot-level price_amount overrides this value.
        currency:
          allOf:
            - $ref: '#/components/schemas/PaymentCurrency'
          nullable: true
          description: Optional schedule-level currency. KWD is currently supported. Slot-level currency overrides this value.

    CreateRecurringPilatesScheduleRequest:
      type: object
      required:
        - mode
        - class_id
        - trainer_staff_profile_id
        - start_date
        - end_date
        - recurrence
      anyOf:
        - required:
            - start_time
        - required:
            - time_slots
      properties:
        mode:
          type: string
          enum:
            - recurring
          example: recurring
        class_id:
          type: string
          format: uuid
        trainer_staff_profile_id:
          type: string
          format: uuid
        studio:
          type: string
          minLength: 1
          maxLength: 120
          default: LAFAM Pilates Studio
          example: LAFAM Pilates Studio
        start_date:
          type: string
          pattern: '^\d{4}-\d{2}-\d{2}$'
          example: '2026-06-22'
        end_date:
          type: string
          pattern: '^\d{4}-\d{2}-\d{2}$'
          example: '2026-07-22'
        start_time:
          type: string
          pattern: '^(?:[01]\d|2[0-3]):[0-5]\d$'
          example: '10:00'
          description: Backward-compatible base start time. Required when time_slots is omitted. When time_slots is provided and start_time is omitted, the backend uses the first slot start_time as the series base start time.
        duration_minutes:
          type: integer
          minimum: 15
          maximum: 240
          default: 60
          example: 60
          description: Schedule-level duration used by backward-compatible recurring creation. Slot-level duration_minutes is used when time_slots is provided.
        capacity:
          type: integer
          minimum: 1
          maximum: 100
          example: 8
          description: Schedule-level capacity fallback. Slot-level capacity overrides this value when time_slots is provided.
        time_slots:
          type: array
          minItems: 1
          maxItems: 12
          description: Multiple recurring slots generated for every matched recurrence date. Required when start_time is omitted.
          items:
            $ref: '#/components/schemas/PilatesScheduleTimeSlotInput'
        price_amount:
          type: number
          minimum: 0
          nullable: true
          example: 15
          description: Optional schedule-level price override copied to generated schedules. Slot-level price_amount overrides this value.
        currency:
          allOf:
            - $ref: '#/components/schemas/PaymentCurrency'
          nullable: true
          description: Optional schedule-level currency. KWD is currently supported. Slot-level currency overrides this value.
        recurrence:
          $ref: '#/components/schemas/PilatesScheduleRecurrenceInput'


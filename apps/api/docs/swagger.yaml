            guest_expires_at:
              type: string
              format: date-time
              nullable: true
            converted_from_guest_at:
              type: string
              format: date-time
              nullable: true
            deactivated_at:
              type: string
              format: date-time
              nullable: true
            deleted_at:
              type: string
              format: date-time
              nullable: true
    AuthSafeSession:
      type: object

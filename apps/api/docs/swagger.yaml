openapi: 3.0.3
info:
  title: LAFAM API
  version: 0.1.0
  description:
    'LAFAM backend API contract for the single-tenant Pilates and ladies salon booking platform. The contract currently
    exposes Core foundation endpoints and the approved Auth module endpoints. Auth includes public customer sign-up/login/password
    reset, guest sessions, authenticated session/profile management, admin user management, and frontend auth-context bootstrapping.


    **OpenAPI JSON:** [openapi.json](/api/openapi.json)

    '
servers:
  - url: http://localhost:4000/api
    description: Local development API server
tags:
  - name: Core
    description: API identity and health-check endpoints
  - name: Auth - Public
    description: Public authentication and password recovery endpoints
  - name: Auth - Guest
    description: Guest session creation, conversion, and ending endpoints
  - name: Auth - Sessions
    description: Authenticated session-management endpoints
  - name: Auth - Profile
    description: Authenticated self-profile, avatar, password, and account endpoints
  - name: Auth - Admin
    description: Protected admin user-management endpoints
  - name: Auth - Context
    description: Authenticated frontend bootstrapping context endpoint
  - name: Staff - Admin
    description: Protected admin staff and trainer management endpoints
  - name: Pilates - Public
    description: Public Pilates class and schedule browsing endpoints
  - name: Pilates - Admin
    description: Protected admin Pilates class and schedule management endpoints
  - name: Bookings - Customer
    description: Protected customer Pilates booking, private trainer booking, availability, and waitlist endpoints
  - name: Bookings - Admin
    description: Protected admin booking, private trainer booking, calendar, override, and waitlist management endpoints
paths:
  /:
    get:
      summary: API identity
      description: Returns basic LAFAM API identity and runtime information.
      operationId: getApiIdentity
      tags:
        - Core
      responses:
        '200':
          description: LAFAM API identity returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiIdentitySuccessResponse'
              example:
                status: 200
                message: LAFAM API is running
                data:
                  service_name: lafam-api
                  service_status: ok
                  environment: development
                  api_prefix: api
                  base_url: http://localhost:4000/api
                  uptime_seconds: 42
                timestamp_ms: 1780918065292
  /health:
    get:
      summary: Process health check
      description: Returns process-level health information for the running API instance.
      operationId: getProcessHealth
      tags:
        - Core
      responses:
        '200':
          description: API process health returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessHealthSuccessResponse'
              example:
                status: 200
                message: Health check successful
                data:
                  service_name: lafam-api
                  service_status: ok
                  environment: development
                  uptime_seconds: 42
                  memory:
                    rss_bytes: 86507520
                    heap_total_bytes: 35651584
                    heap_used_bytes: 24329016
                    external_bytes: 2413816
                    array_buffers_bytes: 532815
                timestamp_ms: 1780918065292
  /health/foundation:
    get:
      summary: Foundation health check
      description: Returns API foundation health, including Supabase/database connectivity status.
      operationId: getFoundationHealth
      tags:
        - Core
      responses:
        '200':
          description: API foundation health returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FoundationHealthSuccessResponse'
              examples:
                healthy:
                  summary: Healthy foundation
                  value:
                    status: 200
                    message: Foundation health check successful
                    data:
                      service_name: lafam-api
                      service_status: ok
                      environment: development
                      uptime_seconds: 42
                      api:
                        service_status: ok
                        base_url: http://localhost:4000/api
                        prefix: api
                      database:
                        service_status: ok
                        provider: supabase
                        project_url: https://example.supabase.co
                        project_ref: example
                        latency_ms: 123
                        checked_at: '2026-06-08T11:12:47.974Z'
                    timestamp_ms: 1780918065292
                degraded:
                  summary: Degraded foundation
                  value:
                    status: 200
                    message: Foundation health check successful
                    data:
                      service_name: lafam-api
                      service_status: degraded
                      environment: development
                      uptime_seconds: 42
                      api:
                        service_status: ok
                        base_url: http://localhost:4000/api
                        prefix: api
                      database:
                        service_status: unavailable
                        provider: supabase
                        project_url: https://example.supabase.co
                        project_ref: example
                        latency_ms: 2500
                        checked_at: '2026-06-08T11:12:47.974Z'
                        error:
                          code: DATABASE_HEALTH_CHECK_FAILED
                          message: Supabase health check failed.
                    timestamp_ms: 1780918065292
  /auth/sign-up:
    post:
      summary: Create customer account
      description: Creates a customer account and starts email verification. Public sign-up never accepts privileged roles.
      operationId: authSignUp
      tags:
        - Auth - Public
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUpRequest'
      responses:
        '201':
          description: Customer account created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSignUpSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
  /auth/verify-email:
    post:
      summary: Verify email OTP
      description: Verifies the email OTP for normal signup or guest conversion.
      operationId: authVerifyEmail
      tags:
        - Auth - Public
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
      responses:
        '200':
          description: Email verified successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthEmailVerificationSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
  /auth/resend-verification-otp:
    post:
      summary: Resend verification OTP
      description: Resends the email verification OTP.
      operationId: authResendVerificationOtp
      tags:
        - Auth - Public
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResendVerificationOtpRequest'
      responses:
        '200':
          description: Verification code sent successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResendVerificationOtpSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
  /auth/login:
    post:
      summary: Login
      description: Authenticates a verified user with email and password and creates an app-owned session record.
      operationId: authLogin
      tags:
        - Auth - Public
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLoginSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
  /auth/refresh-token:
    post:
      summary: Refresh token
      description: Rotates the refresh token, refreshes the provider session, and updates app-owned token hashes.
      operationId: authRefreshToken
      tags:
        - Auth - Public
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token refreshed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthRefreshTokenSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
  /auth/forgot-password:
    post:
      summary: Request password reset OTP
      description: Starts password reset by sending a reset OTP and creating a reset challenge.
      operationId: authForgotPassword
      tags:
        - Auth - Public
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Password reset code sent successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthForgotPasswordSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
  /auth/verify-reset-otp:
    post:
      summary: Verify password reset OTP
      description: Verifies the reset OTP and returns a short-lived reset token.
      operationId: authVerifyResetOtp
      tags:
        - Auth - Public
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyResetOtpRequest'
      responses:
        '200':
          description: Password reset code verified successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthVerifyResetOtpSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
  /auth/reset-password:
    post:
      summary: Reset password
      description: Resets the user password with a verified reset token and revokes existing sessions.
      operationId: authResetPassword
      tags:
        - Auth - Public
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResetPasswordSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
  /auth/guest-session:
    post:
      summary: Create guest session
      description: Creates an authenticated anonymous guest session with limited permissions.
      operationId: authCreateGuestSession
      tags:
        - Auth - Guest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGuestSessionRequest'
      responses:
        '201':
          description: Guest session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthGuestSessionSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
    delete:
      summary: End guest session
      description: Ends the current active guest session. This does not delete a real customer account.
      operationId: authEndGuestSession
      tags:
        - Auth - Guest
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Guest session ended successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthEndGuestSessionSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthenticationRequired'
        '403':
          $ref: '#/components/responses/AuthorizationDenied'
  /auth/guest/convert:
    post:
      summary: Convert guest to customer
      description: Converts the current authenticated guest user into a pending customer account and starts email verification.
      operationId: authConvertGuestToCustomer
      tags:
        - Auth - Guest
      security:
        - BearerAuth: []
      parameters:
        - name: x-refresh-token
          in: header
          required: true
          schema:
            type: string
          description: Current guest refresh token required for conversion.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConvertGuestRequest'
      responses:
        '200':
          description: Guest conversion started successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthGuestConversionSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthenticationRequired'
        '403':
          $ref: '#/components/responses/AuthorizationDenied'
  /auth/logout:
    post:
      summary: Logout current session
      description: Revokes the current app-owned session and signs out the provider session where possible.
      operationId: authLogout
      tags:
        - Auth - Sessions
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Logout successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLogoutSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthenticationRequired'
  /auth/logout-all:
    post:
      summary: Logout all sessions
      description: Revokes all active sessions owned by the authenticated user.
      operationId: authLogoutAll
      tags:
        - Auth - Sessions
      security:
        - BearerAuth: []
      responses:
        '200':
          description: All sessions logged out successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLogoutAllSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthenticationRequired'
  /auth/sessions:
    get:
      summary: List active sessions
      description: Lists active app-owned sessions for the authenticated user.
      operationId: authListSessions
      tags:
        - Auth - Sessions
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Active sessions retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionListSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthenticationRequired'
  /auth/sessions/{sessionId}:
    delete:
      summary: Revoke owned session
      description: Revokes one active session owned by the authenticated user.
      operationId: authRevokeSession
      tags:
        - Auth - Sessions
      security:
        - BearerAuth: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Session id to revoke.
      responses:
        '200':
          description: Session revoked successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthRevokeSessionSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthenticationRequired'
  /auth/me:
    get:
      summary: Get current user
      description: Returns the authenticated user profile.
      operationId: authGetCurrentUser
      tags:
        - Auth - Profile
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current user retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthCurrentUserSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthenticationRequired'
  /auth/profile:
    patch:
      summary: Update profile
      description: 'Updates safe self-service profile fields: full_name, phone, and timezone.'
      operationId: authUpdateProfile
      tags:
        - Auth - Profile
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Profile updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUpdateProfileSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthenticationRequired'
  /auth/avatar:
    post:
      summary: Upload avatar
      description: Uploads and stores the authenticated user avatar. Guests are blocked by the service.
      operationId: authUploadAvatar
      tags:
        - Auth - Profile
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AvatarUploadRequest'
      responses:
        '200':
          description: Avatar uploaded successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthAvatarUploadSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthenticationRequired'
    get:
      summary: Get avatar URL
      description: Returns the current authenticated user avatar path and signed URL if present.
      operationId: authGetAvatar
      tags:
        - Auth - Profile
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Avatar retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthAvatarSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthenticationRequired'
  /auth/change-password:
    post:
      summary: Change password
      description: Changes the authenticated user password after verifying the current password and revokes existing sessions.
      operationId: authChangePassword
      tags:
        - Auth - Profile
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthChangePasswordSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthenticationRequired'
  /auth/delete-account:
    delete:
      summary: Delete own account
      description: Soft-deletes the authenticated user account and revokes active sessions.
      operationId: authDeleteAccount
      tags:
        - Auth - Profile
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Account deleted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthDeleteAccountSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthenticationRequired'
  /auth/admin/users:
    get:
      summary: List users
      description: Lists users for admin user-management screens. Requires admin or super_admin.
      operationId: authAdminListUsers
      tags:
        - Auth - Admin
      security:
        - BearerAuth: []
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Search by email, phone, or full name.
        - name: role
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/AuthUserRole'
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/AuthUserStatus'
        - name: is_guest
          in: query
          required: false
          schema:
            type: boolean
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 50
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Users retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthAdminUserListSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthenticationRequired'
        '403':
          $ref: '#/components/responses/AuthorizationDenied'
  /auth/admin/users/{userId}/deactivate:
    post:
      summary: Deactivate user
      description: Deactivate user. Requires admin or super_admin.
      operationId: authAdminDeactivateUser
      tags:
        - Auth - Admin
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Target app user id.
      responses:
        '200':
          description: User deactivated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthAdminUserMutationSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthenticationRequired'
        '403':
          $ref: '#/components/responses/AuthorizationDenied'
  /auth/admin/users/{userId}/reactivate:
    post:
      summary: Reactivate user
      description: Reactivate user. Requires admin or super_admin.
      operationId: authAdminReactivateUser
      tags:
        - Auth - Admin
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Target app user id.
      responses:
        '200':
          description: User reactivated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthAdminUserMutationSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthenticationRequired'
        '403':
          $ref: '#/components/responses/AuthorizationDenied'
  /auth/admin/users/{userId}/hard-delete:
    delete:
      summary: Hard delete user
      description: Permanently deletes a target user through the Supabase admin boundary. Requires super_admin.
      operationId: authAdminHardDeleteUser
      tags:
        - Auth - Admin
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Target app user id.
      responses:
        '200':
          description: User hard deleted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthAdminHardDeleteUserSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthenticationRequired'
        '403':
          $ref: '#/components/responses/AuthorizationDenied'
  /auth/context:
    get:
      summary: Get auth context
      description: 'Returns authenticated frontend bootstrapping context: user, session, permissions, and access flags.'
      operationId: authGetContext
      tags:
        - Auth - Context
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Auth context resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthContextSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthenticationRequired'
  /admin/staff:
    get:
      summary: List staff members
      description: Lists staff and trainer records for the admin dashboard. Requires admin or super_admin.
      operationId: staffAdminListStaff
      tags:
        - Staff - Admin
      security:
        - BearerAuth: []
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
            maxLength: 254
          description: Search by staff email, phone, or display name.
        - name: portal_role
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/StaffPortalRole'
        - name: staff_status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/StaffProfileStatus'
        - name: auth_status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/AuthUserStatus'
        - name: include_deleted
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Staff members retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffListSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthenticationRequired'
        '403':
          $ref: '#/components/responses/AuthorizationDenied'
    post:
      summary: Create staff member
      description: Creates a staff or trainer account from the admin dashboard. The created Supabase Auth user must verify email before login.
      operationId: staffAdminCreateStaff
      tags:
        - Staff - Admin
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStaffRequest'
      responses:
        '201':
          description: Staff member created successfully. Email verification is required before login.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffMutationSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthenticationRequired'
        '403':
          $ref: '#/components/responses/AuthorizationDenied'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          description: Staff login account creation failed because the authentication provider is temporarily unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/staff/{staffId}:
    get:
      summary: Get staff member
      description: Returns one staff or trainer record by staff profile id. Requires admin or super_admin.
      operationId: staffAdminGetStaffById
      tags:
        - Staff - Admin
      security:
        - BearerAuth: []
      parameters:
        - name: staffId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Staff profile id.
      responses:
        '200':
          description: Staff member retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffMutationSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':

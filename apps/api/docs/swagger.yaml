      type: object
      required:
        - display_name
        - email
        - password
        - confirm_password
        - portal_role
        - post_title
        - working_days
        - start_time
        - end_time
      properties:
        display_name:
          type: string
          minLength: 1
          maxLength: 120
          example: Sarah Pilates Trainer
        email:
          type: string
          format: email
          maxLength: 254
          example: trainer@example.com
        phone:
          type: string
          nullable: true
          maxLength: 32
          example: '+96550000000'
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 128
          writeOnly: true
          example: StrongPass123!
        confirm_password:
          type: string
          format: password
          minLength: 8
          maxLength: 128
          writeOnly: true
          example: StrongPass123!
        address:
          type: string
          nullable: true
          maxLength: 500
          example: Salmiya, Kuwait
        portal_role:
          $ref: '#/components/schemas/StaffPortalRole'
        post_title:
          type: string
          minLength: 1
          maxLength: 100
          example: Pilates Trainer
        working_days:
          type: array
          minItems: 1
          maxItems: 7
          uniqueItems: true
          items:
            $ref: '#/components/schemas/StaffDayOfWeek'
          example:
            - 1
            - 2
            - 3
            - 4
            - 5
        start_time:
          type: string
          pattern: '^(?:[01]\d|2[0-3]):[0-5]\d$'
          example: '09:00'
        end_time:
          type: string
          pattern: '^(?:[01]\d|2[0-3]):[0-5]\d$'
          example: '17:00'
        specialties:

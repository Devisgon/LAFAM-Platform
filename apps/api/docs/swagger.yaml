        - id
        - type
        - device_id
        - device_name
        - ip_address
        - user_agent
        - created_at
        - last_seen_at
        - expires_at
        - revoked_at
        - revoked_reason
        - converted_at
      properties:
        id:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/AuthSessionType'
        device_id:
          type: string
          nullable: true
          example: web-chrome
        device_name:
          type: string
          nullable: true
          example: Chrome on Windows
        ip_address:
          type: string
          nullable: true
          example: 203.0.113.10
        user_agent:
          type: string
          nullable: true
          example: Mozilla/5.0
        created_at:
          type: string
          format: date-time
        last_seen_at:
          type: string
          format: date-time
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
        revoked_at:
          type: string
          format: date-time
          nullable: true
        revoked_reason:
          type: string
          nullable: true
          example: logout
        converted_at:
          type: string
          format: date-time
          nullable: true
    AuthActiveSession:

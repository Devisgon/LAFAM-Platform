components:
  schemas:
    ApiSuccessBase:
      type: object
      required:
        - status
        - message
        - data
        - timestamp_ms
      properties:
        status:
          type: integer
          example: 200
        message:
          type: string
          example: Health check successful
        timestamp_ms:
          type: integer
          format: int64
          example: 1780918065292
    CoreHealthStatus:
      type: string
      enum:
        - ok
        - degraded
        - unavailable
    ApiIdentityData:
      type: object
      required:
        - service_name
        - service_status
        - environment
        - api_prefix
        - base_url
        - uptime_seconds
      properties:
        service_name:
          type: string
          enum:
            - lafam-api
        service_status:
          $ref: '#/components/schemas/CoreHealthStatus'
        environment:
          type: string
          example: development
        api_prefix:
          type: string
          example: api
        base_url:
          type: string
          example: http://localhost:4000/api
        uptime_seconds:
          type: integer
          example: 42
    ProcessHealthData:
      type: object
      required:
        - service_name
        - service_status
        - environment
        - uptime_seconds
        - memory
      properties:
        service_name:
          type: string
          enum:
            - lafam-api
        service_status:
          $ref: '#/components/schemas/CoreHealthStatus'
        environment:
          type: string
          example: development
        uptime_seconds:
          type: integer
          example: 42
        memory:
          $ref: '#/components/schemas/ProcessMemory'
    ProcessMemory:
      type: object
      required:
        - rss_bytes
        - heap_total_bytes
        - heap_used_bytes
        - external_bytes
        - array_buffers_bytes
      properties:
        rss_bytes:
          type: integer
          example: 86507520
        heap_total_bytes:
          type: integer
          example: 35651584
        heap_used_bytes:
          type: integer
          example: 24329016
        external_bytes:
          type: integer
          example: 2413816
        array_buffers_bytes:
          type: integer
          example: 532815
    FoundationHealthData:
      type: object
      required:
        - service_name
        - service_status
        - environment
        - uptime_seconds
        - api
        - database
      properties:
        service_name:
          type: string
          enum:
            - lafam-api
        service_status:
          $ref: '#/components/schemas/CoreHealthStatus'
        environment:
          type: string
          example: development
        uptime_seconds:
          type: integer
          example: 42
        api:
          $ref: '#/components/schemas/FoundationApiHealth'
        database:
          $ref: '#/components/schemas/FoundationDatabaseHealth'
    FoundationApiHealth:
      type: object
      required:
        - service_status
        - base_url
        - prefix
      properties:
        service_status:
          $ref: '#/components/schemas/CoreHealthStatus'
        base_url:
          type: string
          example: http://localhost:4000/api
        prefix:
          type: string
          example: api
    FoundationDatabaseHealth:
      type: object
      required:
        - service_status
        - provider
        - project_url
        - project_ref
        - latency_ms
        - checked_at
      properties:
        service_status:
          $ref: '#/components/schemas/CoreHealthStatus'
        provider:
          type: string
          example: supabase
        project_url:
          type: string
          example: https://example.supabase.co
        project_ref:
          type: string
          nullable: true
          example: example
        latency_ms:
          type: integer
          example: 123
        checked_at:
          type: string
          format: date-time
          example: '2026-06-08T11:12:47.974Z'
        error:
          $ref: '#/components/schemas/FoundationHealthError'
    FoundationHealthError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          example: DATABASE_HEALTH_CHECK_FAILED
        message:
          type: string
          example: Supabase health check failed.
    ApiIdentitySuccessResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ApiIdentityData'
    ProcessHealthSuccessResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ProcessHealthData'
    FoundationHealthSuccessResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/FoundationHealthData'
    ErrorResponse:
      type: object
      required:
        - success
        - error
      properties:
        success:
          type: boolean
          enum:
            - false
        error:
          type: object
          required:
            - code
            - message
            - statusCode
            - path
            - method
            - timestamp
          properties:
            code:
              type: string
              example: AUTHENTICATION_REQUIRED
            message:
              type: string
              example: Authentication is required.
            statusCode:
              type: integer
              example: 401
            path:
              type: string
              example: /api/auth/me
            method:
              type: string
              example: GET
            timestamp:
              type: string
              format: date-time
              example: '2026-06-09T18:20:00.000Z'
            requestId:
              type: string
              example: a3f7bb42-52d6-4b4a-b2fd-a15352b50d11
            details:
              type: object
              additionalProperties: true
              nullable: true
    AuthUserRole:
      type: string
      enum:
        - guest
        - customer
        - admin
        - trainer
        - stylist
        - staff
        - super_admin
    AuthUserStatus:
      type: string
      enum:
        - guest_active
        - pending_email_verification
        - active
        - deactivated
        - deleted
    AuthSessionType:
      type: string
      enum:
        - guest
        - authenticated
        - admin
        - staff
    AuthPermission:
      type: string
      enum:
        - public:read_home
        - public:read_classes
        - public:read_class_details
        - public:read_trainers
        - public:read_offers
        - guest:create_session
        - guest:read_public_catalog
        - guest:read_availability
        - guest:convert_to_customer
        - guest:end_session
        - auth:read_context
        - session:logout
        - session:logout_all
        - session:read_active
        - session:revoke
        - profile:read
        - profile:update
        - profile:delete_account
        - avatar:read
        - avatar:upload
        - password:change
        - booking:create_confirmed
        - booking:view_history
        - booking:cancel
        - booking:reschedule
        - payment:create
        - wallet:read
        - staff:access_dashboard
        - admin:access_dashboard
        - admin:users:read
        - admin:users:deactivate
        - admin:users:reactivate
        - super_admin:users:hard_delete
    AuthSafeUser:
      type: object
      required:
        - id
        - email
        - phone
        - full_name
        - role
        - status
        - is_guest
        - avatar_path
        - timezone
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
          nullable: true
          example: customer@example.com
        phone:
          type: string
          nullable: true
          example: '+96550000000'
        full_name:
          type: string
          nullable: true
          example: Saqiba Customer
        role:
          $ref: '#/components/schemas/AuthUserRole'
        status:
          $ref: '#/components/schemas/AuthUserStatus'
        is_guest:
          type: boolean
          example: false
        avatar_path:
          type: string
          nullable: true
          example: users/9f35b13e/avatar.jpg
        timezone:
          type: string
          nullable: true
          example: Asia/Kuwait
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    AuthAdminUser:
      allOf:
        - $ref: '#/components/schemas/AuthSafeUser'

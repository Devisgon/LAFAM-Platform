    CreatePrivateBookingRequest:
      type: object
      required:
        - trainer_staff_profile_id
        - session_date
        - start_time
      properties:
        user_id:
          type: string
          format: uuid
          description: Required only for admin-created private bookings. Customer routes ignore this and use the authenticated user.
        trainer_staff_profile_id:
          type: string
          format: uuid
          description: Trainer staff profile id.
        session_date:
          type: string
          format: date
          example: '2026-06-20'
        start_time:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
          example: '11:00'
        duration_minutes:
          type: integer
          minimum: 15
          maximum: 240
          default: 60
          description: Backend calculates end_time from start_time and duration_minutes.
        studio:
          type: string
          minLength: 2
          maxLength: 120
          default: LAFAM Pilates Studio
          example: LAFAM Pilates Studio
        payment_required:
          type: boolean
          default: false
        idempotency_key:
          type: string
          maxLength: 160
          example: private-booking-20260620-1100

    ReschedulePrivateBookingRequest:
      type: object
      required:
        - target_session_date
        - target_start_time
      properties:
        target_session_date:
          type: string
          format: date
          example: '2026-06-21'
        target_start_time:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
          example: '12:00'
        target_duration_minutes:
          type: integer
          minimum: 15
          maximum: 240
          description: If omitted, the existing private booking duration is preserved.
        studio:
          type: string
          minLength: 2
          maxLength: 120
          nullable: true
          description: If omitted, the existing private booking studio is preserved.
          example: LAFAM Pilates Studio
        reason:
          type: string
          maxLength: 1000
          nullable: true
          example: Customer requested a later time.
        idempotency_key:
          type: string
          maxLength: 160
          example: private-reschedule-20260621-1200
        payment_required:
          type: boolean
          nullable: true
          description: If omitted, the existing private booking payment behavior is preserved.

